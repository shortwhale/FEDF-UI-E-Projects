<!DOCTYPE html>
<html>
<body>

<input onkeyup="search()" placeholder="Search">

<ul id="list">
  <li>Apple</li>
  <li>Mango</li>
  <li>Banana</li>
  <li>Orange</li>
  <li>Grapes</li>
  <li>Pineapple</li>
  <li>Strawberry</li>
  <li>Watermelon</li>
  <li>Papaya</li>
  <li>Guava</li>
  <li>Kiwi</li>
  <li>Cherry</li>
  <li>Peach</li>
  <li>Plum</li>
  <li>Blueberry</li>
  <li>Dragonfruit</li>
  <li>Lychee</li>
  <li>Pomegranate</li>
  <li>Apricot</li>
  <li>Jackfruit</li>
</ul>

<script>
function search() {
  let val = document.querySelector("input").value.toLowerCase();
  document.querySelectorAll("li").forEach(li => {
    li.style.display = li.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
}
</script>

</body>
</html>
