<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
}

.container {
  margin-top: 80px;
}

h1 {
  font-size: 70px;
}

span {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 10px;
  display: inline-block;
  transition: 0.3s;
}

.dom { background: #ff4d4d; }
.vdom { background: #00ff99; color: black; }

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.domBtn { background: red; color: white; }
.vdomBtn { background: green; color: white; }

#status, #updates {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h2>⚡ DOM vs VDOM Counter</h2>

  <h1>
    <span id="hundreds">0</span>
    <span id="tens">0</span>
    <span id="ones">0</span>
  </h1>

  <button class="domBtn" onclick="useDOM()">DOM</button>
  <button class="vdomBtn" onclick="useVDOM()">VDOM</button>
  <br>

  <button onclick="pause()">Pause</button>
  <button onclick="resume()">Resume</button>
  <button onclick="reset()">Reset</button>

  <p id="status">Click a mode</p>
  <p id="updates">Updates: 0</p>
</div>

<script>
// ================= STATE =================
let state = 1;
let oldState = 1;
let interval = null;
let mode = "";
let running = false;
let updateCount = 0;

// ================= UTIL =================
function getDigits(num) {
  return {
    h: Math.floor(num / 100),
    t: Math.floor((num % 100) / 10),
    o: num % 10
  };
}

function flash(id, cls) {
  let el = document.getElementById(id);
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 200);
}

function updateUI(text) {
  document.getElementById("status").innerText = text;
  document.getElementById("updates").innerText =
    "Updates: " + updateCount;
}

// ================= COMPONENT STYLE =================
function setDigit(id, value, type) {
  document.getElementById(id).innerText = value;
  flash(id, type);
  updateCount++;
}

// ================= CORE =================
function clearAll() {
  clearInterval(interval);
  running = false;
}

function renderAll(num) {
  let d = getDigits(num);
  setDigit("hundreds", d.h, "dom");
  setDigit("tens", d.t, "dom");
  setDigit("ones", d.o, "dom");
}

// ================= MODES =================
function useDOM() {
  clearAll();

  mode = "DOM";
  state = 1;
  updateCount = 0;

  renderAll(state);

  interval = setInterval(() => {

    renderAll(state);

    updateUI("DOM Mode (All updates): " + state);

    state = state >= 999 ? 1 : state + 1;

  }, 2000);

  running = true;
}

function useVDOM() {
  clearAll();

  mode = "VDOM";
  state = 1;
  oldState = 1;
  updateCount = 0;

  renderAll(state);

  interval = setInterval(() => {

    let newD = getDigits(state);
    let oldD = getDigits(oldState);

    if (newD.h !== oldD.h) {
      setDigit("hundreds", newD.h, "vdom");
    }

    if (newD.t !== oldD.t) {
      setDigit("tens", newD.t, "vdom");
    }

    if (newD.o !== oldD.o) {
      setDigit("ones", newD.o, "vdom");
    }

    updateUI("VDOM Mode (Smart updates): " + state);

    oldState = state;
    state = state >= 999 ? 1 : state + 1;

  }, 500);

  running = true;
}

// ================= CONTROLS =================
function pause() {
  clearInterval(interval);
  running = false;
  updateUI("Paused");
}

function resume() {
  if (running) return;

  if (mode === "DOM") useDOM();
  else if (mode === "VDOM") useVDOM();
}

function reset() {
  clearAll();
  state = 1;
  oldState = 1;
  updateCount = 0;

  document.getElementById("hundreds").innerText = 0;
  document.getElementById("tens").innerText = 0;
  document.getElementById("ones").innerText = 0;

  updateUI("Reset");
}
</script>

</body>
</html>
